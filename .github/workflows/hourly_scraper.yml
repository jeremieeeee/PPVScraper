name: Hourly Sports Stream Scraper

on:
  schedule:
    # Runs automatically at the start of every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to click "Run workflow" manually to test it

permissions:
  contents: write # Crucial: Gives the action permission to write playlist.m3u back to your repo

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Check out repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        playwright install chromium

    - name: Run Stream Scraper Engine
      run: python scraper.py

    - name: Commit and Push Updated Playlist
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Check if playlist.m3u was created or modified
        git add playlist.m3u
        
        # Only commit if there are actual changes, preventing empty action failures
        if ! git diff-index --quiet HEAD; then
          git commit -m "Automated Playlist Update [Skip CI]"
          git push origin main
          echo "Playlist updated and pushed successfully!"
        else
          echo "No changes detected in the streaming layout. Skipping commit."
        fi
